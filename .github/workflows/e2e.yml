name: E2E

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: supabase/setup-cli@v1

      - run: npm ci

      - run: supabase start

      - name: Export local Supabase env
        shell: bash
        run: |
          supabase status -o env > supabase.env
          echo "NEXT_PUBLIC_SUPABASE_URL=$(grep '^API_URL=' supabase.env | cut -d= -f2-)" >> "$GITHUB_ENV"
          echo "SUPABASE_URL=$(grep '^API_URL=' supabase.env | cut -d= -f2-)" >> "$GITHUB_ENV"
          echo "SUPABASE_SERVICE_ROLE_KEY=$(grep '^SERVICE_ROLE_KEY=' supabase.env | cut -d= -f2-)" >> "$GITHUB_ENV"

      - run: supabase db reset

      - run: npm run check:backend:db

  playwright:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY }}
      E2E_CUSTOMER_PHONE: ${{ secrets.E2E_CUSTOMER_PHONE }}
      E2E_CUSTOMER_OTP: ${{ secrets.E2E_CUSTOMER_OTP }}
      E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
      E2E_ALLOW_REMOTE_SUPABASE_TESTS: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - run: npm run lint

      - run: npm run build

      - run: npm run test:e2e
