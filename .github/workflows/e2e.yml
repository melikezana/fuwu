name: Launch verification

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  local-supabase-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: supabase/setup-cli@v1

      - run: npm ci

      - name: Start and reset local Supabase
        run: |
          supabase start
          supabase db reset
          supabase stop
          supabase start

      - name: Export local Supabase environment
        shell: bash
        run: |
          eval "$(supabase status -o env)"
          echo "NEXT_PUBLIC_SUPABASE_URL=$API_URL" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON_KEY" >> "$GITHUB_ENV"
          echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY" >> "$GITHUB_ENV"
          echo "E2E_ALLOW_REMOTE_SUPABASE_TESTS=false" >> "$GITHUB_ENV"
          echo "E2E_MAILPIT_URL=http://127.0.0.1:54324" >> "$GITHUB_ENV"

      - run: npm run check:backend:db

      - run: npm run lint

      - run: npm run build

      - run: npx playwright install --with-deps chromium

      - run: npm run test:e2e

      - name: Upload Playwright evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
